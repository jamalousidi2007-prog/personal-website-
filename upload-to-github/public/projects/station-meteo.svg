<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7ec8ff"/>
      <stop offset="55%" stop-color="#2f5c94"/>
      <stop offset="100%" stop-color="#0f1d35"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1d2f4b"/>
      <stop offset="100%" stop-color="#142238"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="700" fill="url(#sky)"/>
  <circle cx="170" cy="130" r="55" fill="#ffd26a"/>

  <g fill="#d5e7ff" opacity="0.95">
    <ellipse cx="350" cy="160" rx="95" ry="48"/>
    <ellipse cx="420" cy="145" rx="70" ry="35"/>
    <ellipse cx="290" cy="145" rx="62" ry="33"/>
  </g>

  <g fill="#c9def7" opacity="0.7">
    <rect x="285" y="200" width="5" height="38" rx="2.5"/>
    <rect x="320" y="206" width="5" height="30" rx="2.5"/>
    <rect x="355" y="210" width="5" height="24" rx="2.5"/>
    <rect x="390" y="204" width="5" height="33" rx="2.5"/>
    <rect x="425" y="210" width="5" height="25" rx="2.5"/>
  </g>

  <rect x="130" y="300" width="940" height="260" rx="28" fill="url(#panel)" stroke="#89b1de" stroke-opacity="0.28"/>

  <g transform="translate(190,350)">
    <rect x="0" y="0" width="180" height="170" rx="18" fill="#172944"/>
    <text x="20" y="34" fill="#8eb5df" font-size="20" font-family="Arial">Temperature</text>
    <text x="20" y="95" fill="#ff9f9d" font-size="56" font-family="Arial" font-weight="700">23.8</text>
    <text x="142" y="95" fill="#8eb5df" font-size="24" font-family="Arial">deg C</text>
  </g>

  <g transform="translate(405,350)">
    <rect x="0" y="0" width="180" height="170" rx="18" fill="#172944"/>
    <text x="20" y="34" fill="#8eb5df" font-size="20" font-family="Arial">Humidity</text>
    <text x="20" y="95" fill="#7bbaff" font-size="56" font-family="Arial" font-weight="700">61</text>
    <text x="125" y="95" fill="#8eb5df" font-size="28" font-family="Arial">%</text>
  </g>

  <g transform="translate(620,350)">
    <rect x="0" y="0" width="390" height="170" rx="18" fill="#172944"/>
    <polyline points="20,125 60,110 100,120 140,95 180,102 220,78 260,84 300,66 340,70" fill="none" stroke="#76c4ff" stroke-width="5" stroke-linecap="round"/>
    <polyline points="20,138 60,130 100,136 140,122 180,127 220,113 260,117 300,103 340,106" fill="none" stroke="#e24b4a" stroke-width="3" stroke-linecap="round" opacity="0.75"/>
    <text x="20" y="35" fill="#8eb5df" font-size="20" font-family="Arial">Live Chart</text>
  </g>

  <text x="78" y="646" fill="#ffffff" font-size="62" font-family="Arial" font-weight="700">Station Meteo</text>
  <text x="80" y="676" fill="#9ec1e7" font-size="22" font-family="Arial">Real-time weather monitoring dashboard</text>
</svg>